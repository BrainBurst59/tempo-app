version: 2

# Automated dependency update PRs (CLAUDE.md §19). These open against `main`
# through the same protected PR flow and CI gates as any other change, so
# updates are reviewed, not auto-applied. Security scanning (OSV, pnpm audit,
# dependency review) runs on each Dependabot PR.

updates:
  # JavaScript/TypeScript workspace (pnpm). Root manifest covers the workspace.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Batch low-risk dev/lint/test tooling to cut PR noise; runtime deps stay
      # individual so each is reviewed on its own.
      dev-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows in this directory.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
