name: OSV-Scanner

# Dependency vulnerability scanning against the OSV database, covering the
# committed pnpm-lock.yaml across the whole workspace. On pull requests this
# uses the diff-aware reusable workflow so a PR is gated on vulnerabilities it
# *introduces* rather than pre-existing advisories deep in the transitive tree.
# Scheduled/main runs do a full scan and upload results to code scanning.

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '12 5 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-pr:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: 'google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8'

  scan-scheduled:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
    uses: 'google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v1.9.2'
